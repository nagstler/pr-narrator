name: Bug report
description: Report a problem with pr-narrator
title: "bug: <short description>"
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the unexpected behavior.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal commands or input that trigger the bug.
      placeholder: |
        1. Run `pr-narrator ...`
        2. ...
        3. See error
    validations:
      required: true
  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "3.11.9"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 14.4 / Ubuntu 24.04 / Windows 11"
    validations:
      required: true
  - type: input
    id: claude-code-version
    attributes:
      label: claude-code version
      description: Output of `claude --version`, if relevant.
      placeholder: "1.0.0"
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      render: shell
    validations:
      required: false
