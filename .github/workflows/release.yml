name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  build:
    name: build wheel + sdist
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Python 3.11
        run: uv python install 3.11

      - name: Build distributions
        run: uv build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 7

  publish-pypi:
    name: publish to PyPI (trusted publishing)
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/pr-narrator
    permissions:
      id-token: write
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: create GitHub Release
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Resolve version from tag
        id: version
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog section
        id: changelog
        run: |
          version="${{ steps.version.outputs.version }}"
          notes_file="$(mktemp)"
          python - "$version" "$notes_file" <<'PY'
          import sys, re, pathlib
          version, out_path = sys.argv[1], sys.argv[2]
          text = pathlib.Path("CHANGELOG.md").read_text(encoding="utf-8")
          # Match a heading like `## [0.1.0] - 2026-05-01` and capture
          # until the next `## [` heading or end of file.
          pattern = re.compile(
              rf"^##\s+\[{re.escape(version)}\][^\n]*\n(.*?)(?=^##\s+\[|\Z)",
              re.MULTILINE | re.DOTALL,
          )
          m = pattern.search(text)
          if not m:
              print(f"::warning::no CHANGELOG section for {version}; using fallback notes")
              fallback = (
                  f"Release v{version}.\n\n"
                  f"See [CHANGELOG.md](https://github.com/nagstler/pr-narrator/"
                  f"blob/main/CHANGELOG.md) for details."
              )
              pathlib.Path(out_path).write_text(fallback, encoding="utf-8")
              sys.exit(0)
          body = m.group(1).strip() + "\n"
          pathlib.Path(out_path).write_text(body, encoding="utf-8")
          PY
          echo "notes_file=${notes_file}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --notes-file "${{ steps.changelog.outputs.notes_file }}" \
            dist/*.whl dist/*.tar.gz
